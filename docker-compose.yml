# Ticket Tracker — full stack. From a clean checkout at the repo root:
#   docker compose up --build
# No host-installed frontend, backend, or database runtime is required.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tickettracker}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tickettracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: src/TicketTracker.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-tickettracker};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__Issuer: ${JWT_ISSUER:-TicketTracker}
      Jwt__Audience: ${JWT_AUDIENCE:-TicketTracker}
      Jwt__Secret: ${JWT_SECRET:-dev-only-super-secret-key-change-me-please-32bytes-minimum!!}
      # SMTP defaults to the bundled Mailpit sink; override with relay1.dataart.com in .env for real mail.
      Smtp__Host: ${SMTP_HOST:-mail}
      Smtp__Port: ${SMTP_PORT:-1025}
      Smtp__UseStartTls: ${SMTP_USE_STARTTLS:-false}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL:-no-reply@tickettracker.local}
      Smtp__FromName: ${SMTP_FROM_NAME:-Ticket Tracker}
      # Base URL of the SPA, used to build verification links.
      App__ClientUrl: ${APP_CLIENT_URL:-http://localhost:${WEB_PORT:-8080}}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Local development mail sink. Web UI at http://localhost:8025.
  mail:
    image: axllent/mailpit:latest
    ports:
      - "${MAIL_WEB_PORT:-8025}:8025"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
